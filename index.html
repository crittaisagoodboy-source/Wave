<script>
const buttons = document.querySelectorAll('[data-tab]');
const tabButtons = document.querySelectorAll('.tab-button');
const highlight = document.getElementById('highlight');
const tabContainer = document.getElementById('tabContainer');
const settingsContainer = document.getElementById('settingsContainer');
const outerTrack = document.getElementById('outerScrollTrack');
const outerThumb = document.getElementById('outerScrollThumb');

let currentIndex = 0, currentTabIndex = 0;
let isSettingsTab = false;

const fonts = [
  { name: 'Poppins',  css: "'Poppins', sans-serif" },
  { name: 'Inter',    css: "'Inter', sans-serif" },
  { name: 'Rajdhani', css: "'Rajdhani', sans-serif" },
  { name: 'Nunito',   css: "'Nunito', sans-serif" },
  { name: 'Exo 2',    css: "'Exo 2', sans-serif" },
];
let fontIndex = 0;

function applyFont(idx) {
  fontIndex = (idx + fonts.length) % fonts.length;
  const f = fonts[fontIndex];
  document.getElementById('fontLabel').textContent = f.name;
  document.getElementById('fontLabel').style.fontFamily = f.css;
  document.getElementById('solarisWrap').style.fontFamily = f.css;
  document.querySelectorAll('#solarisWrap button, #solarisWrap span').forEach(el => el.style.fontFamily = f.css);
}

window.changeFont = function(dir) { applyFont(fontIndex + dir); };

function syncTrackHeight() {
  outerTrack.style.height = document.getElementById('menuMain').offsetHeight + 'px';
}

function updateScrollThumb() {
  const active = isSettingsTab ? settingsContainer : tabContainer;
  const trackH = outerTrack.clientHeight;
  const contentH = active.scrollHeight;
  const visibleH = active.clientHeight;
  if (contentH <= visibleH) { outerThumb.style.display = 'none'; return; }
  outerThumb.style.display = 'block';
  const thumbH = Math.max((visibleH / contentH) * trackH, 28);
  const maxTop = trackH - thumbH;
  outerThumb.style.height = thumbH + 'px';
  outerThumb.style.top = ((active.scrollTop / (contentH - visibleH)) * maxTop) + 'px';
}

tabContainer.addEventListener('scroll', updateScrollThumb);
settingsContainer.addEventListener('scroll', updateScrollThumb);
window.addEventListener('resize', () => { syncTrackHeight(); updateScrollThumb(); });

let isDragging = false, dragY = 0, dragScroll = 0;
outerThumb.addEventListener('mousedown', (e) => {
  isDragging = true; dragY = e.clientY;
  dragScroll = (isSettingsTab ? settingsContainer : tabContainer).scrollTop;
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const active = isSettingsTab ? settingsContainer : tabContainer;
  const trackH = outerTrack.clientHeight, contentH = active.scrollHeight, visibleH = active.clientHeight;
  const thumbH = Math.max((visibleH / contentH) * trackH, 28);
  active.scrollTop = dragScroll + ((e.clientY - dragY) / (trackH - thumbH)) * (contentH - visibleH);
});
document.addEventListener('mouseup', () => { isDragging = false; });

outerTrack.addEventListener('click', (e) => {
  if (e.target === outerThumb) return;
  const active = isSettingsTab ? settingsContainer : tabContainer;
  const r = outerTrack.getBoundingClientRect();
  active.scrollTop = ((e.clientY - r.top) / r.height) * (active.scrollHeight - active.clientHeight);
});

function updateHighlight(i) {
  const btn = buttons[i]; if (!btn) return;
  highlight.style.top = (btn.offsetTop - 2) + 'px';
  const bT = btn.offsetTop, bB = bT + btn.offsetHeight;
  const cT = tabContainer.scrollTop, cH = tabContainer.clientHeight;
  if (bT < cT) tabContainer.scrollTop = bT;
  else if (bB > cT + cH) tabContainer.scrollTop = bB - cH;
}

function switchToTab(isSettings) {
  isSettingsTab = isSettings;
  tabContainer.style.display = isSettings ? 'none' : 'block';
  settingsContainer.style.display = isSettings ? 'block' : 'none';
  highlight.style.display = isSettings ? 'none' : 'block';
  updateScrollThumb();
}

function updateTabHighlight(i) {
  tabButtons.forEach((btn, idx) => {
    btn.style.opacity = idx === i ? '1' : '0.55';
    btn.style.borderBottom = idx === i ? '3px solid rgba(41,182,246,0.85)' : 'none';
  });
  switchToTab(i === 1);
}

buttons.forEach((btn, i) => btn.addEventListener('click', () => { currentIndex = i; updateHighlight(i); }));
tabButtons.forEach((btn, i) => btn.addEventListener('click', () => { currentTabIndex = i; updateTabHighlight(i); }));

buttons[0].click();
updateTabHighlight(0);
setTimeout(() => { syncTrackHeight(); updateScrollThumb(); }, 50);

document.addEventListener('keydown', (e) => {
  if (isSettingsTab) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); applyFont(fontIndex - 1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); applyFont(fontIndex + 1); }
    else if (e.key.toLowerCase() === 'e') { e.preventDefault(); currentTabIndex = (currentTabIndex + 1) % tabButtons.length; updateTabHighlight(currentTabIndex); }
    else if (e.key.toLowerCase() === 'q') { e.preventDefault(); currentTabIndex = (currentTabIndex - 1 + tabButtons.length) % tabButtons.length; updateTabHighlight(currentTabIndex); }
    return;
  }
if (data.type === 'key') {
    if (data.key === 'ArrowDown') { currentIndex = (currentIndex + 1) % buttons.length; updateHighlight(currentIndex); }
    else if (data.key === 'ArrowUp') { currentIndex = (currentIndex - 1 + buttons.length) % buttons.length; updateHighlight(currentIndex); }
    else if (data.key === 'Enter') { buttons[currentIndex]?.click(); }
}
  else if (e.key.toLowerCase() === 'e') { e.preventDefault(); currentTabIndex = (currentTabIndex + 1) % tabButtons.length; updateTabHighlight(currentTabIndex); }
  else if (e.key.toLowerCase() === 'q') { e.preventDefault(); currentTabIndex = (currentTabIndex - 1 + tabButtons.length) % tabButtons.length; updateTabHighlight(currentTabIndex); }
});

// MachoSendDuiMessage handler
// Usage: MachoSendDuiMessage(dui, '{"type":"scroll","direction":"up"}')
//        MachoSendDuiMessage(dui, '{"type":"scroll","direction":"down"}')
//        MachoSendDuiMessage(dui, '{"type":"scroll","direction":"up","amount":80}')   -- optional custom px amount
window.addEventListener("message", (e) => {
    const msg = e.data;

    if (msg === "scrollUp") {
        const active = isSettingsTab ? settingsContainer : tabContainer;
        active.scrollTop -= 40;
        updateScrollThumb();
    }

    if (msg === "scrollDown") {
        const active = isSettingsTab ? settingsContainer : tabContainer;
        active.scrollTop += 40;
        updateScrollThumb();
    }

    if (msg === "enter") {
        buttons[currentIndex]?.click();
    }

    if (msg === "tabLeft") {
        currentTabIndex = (currentTabIndex - 1 + tabButtons.length) % tabButtons.length;
        updateTabHighlight(currentTabIndex);
    }

    if (msg === "tabRight") {
        currentTabIndex = (currentTabIndex + 1) % tabButtons.length;
        updateTabHighlight(currentTabIndex);
    }
});
window.addEventListener("message", (e) => {
    alert("Received: " + JSON.stringify(e.data));
    console.log("Received:", e.data);
});
 
</script>
